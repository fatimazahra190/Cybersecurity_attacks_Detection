# CyberSec Lambda — Docker Compose
# FIXES:
#   - Removed obsolete "version" attribute
#   - Removed static IPs (let Docker assign automatically — avoids subnet conflicts)
#   - Subnet changed to 192.168.90.0/24 (rarely used by other networks)
#   - All static ipv4_address entries removed from services

networks:
  cybersec-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.90.0/24

volumes:
  hadoop_namenode:
  hadoop_datanode:
  cassandra_data:

services:

  # ── ZooKeeper ────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: py-zookeeper
    hostname: zookeeper
    networks:
      - cybersec-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]      
      interval: 10s
      timeout: 5s
      retries: 1
      start_period: 5s
    restart: unless-stopped

  # ── Kafka ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: py-kafka
    hostname: kafka
    networks:
      - cybersec-net
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 10000000
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Hadoop NameNode ──────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: py-namenode
    hostname: namenode
    networks:
      - cybersec-net
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      CLUSTER_NAME: cybersec
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_namenode_safemode_threshold___pct: "0.0"
      HDFS_CONF_dfs_namenode_safemode_min___datanodes: 0
      HDFS_CONF_dfs_permissions_enabled: "false"
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
      HADOOP_HEAPSIZE: 512
    healthcheck:
      test: ["CMD-SHELL", "hdfs dfsadmin -safemode get 2>/dev/null | grep -q 'OFF' || (hdfs dfsadmin -safemode leave && exit 0)"]
      interval: 20s
      timeout: 15s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # ── Hadoop DataNode ──────────────────────────────────────────────
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: py-datanode
    hostname: datanode
    networks:
      - cybersec-net
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_permissions_enabled: "false"
      SERVICE_PRECONDITION: "namenode:9870"
      HADOOP_HEAPSIZE: 512
    restart: unless-stopped

  # ── HBase + Thrift Server (port 9090 for Python happybase) ───────
  hbase:
    build:
      context: .
      dockerfile: Dockerfile.hbase
    container_name: py-hbase
    hostname: hbase
    networks:
      - cybersec-net
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "9090:9090"
      - "16000:16000"
      - "16010:16010"
      - "16020:16020"
      - "16030:16030"
    environment:
      HBASE_CONF_hbase_rootdir: "hdfs://namenode:9000/hbase"
      HBASE_CONF_hbase_zookeeper_quorum: zookeeper
      HBASE_CONF_hbase_zookeeper_property_clientPort: 2181
      HBASE_CONF_hbase_cluster_distributed: "false"
      JAVA_OPTS: "-Xmx512m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 2>/dev/null && echo OK"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  # ── Cassandra ────────────────────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: py-cassandra
    hostname: cassandra
    networks:
      - cybersec-net
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: cybersec-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "128M"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' 2>/dev/null | head -1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # ── Spark (batch jobs — idle container, triggered via docker exec)
  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: py-spark
    hostname: spark
    networks:
      - cybersec-net
    depends_on:
      namenode:
        condition: service_healthy
      hbase:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    volumes:
      - ./batch-layer:/app/batch-layer
      - ./speed-layer:/app/speed-layer
      - ./data:/app/data
    environment:
      HADOOP_NAMENODE: namenode
      HADOOP_PORT: "9000"
      HBASE_HOST: hbase
      HBASE_PORT: "9090"
      ZOOKEEPER_HOST: zookeeper
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: "9042"
      KAFKA_BOOTSTRAP: "kafka:29092"
      PYTHONPATH: "/app/batch-layer:/app/speed-layer"
    command: ["-c", "import time; print('Spark container ready'); [time.sleep(300) for _ in iter(int, 1)]"]
    restart: unless-stopped

  # ── Spark Streaming (3 real-time detectors) ──────────────────────
  streaming:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: py-streaming
    hostname: streaming
    networks:
      - cybersec-net
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    volumes:
      - ./speed-layer:/app/speed-layer
      - ./batch-layer:/app/batch-layer
      - ./data:/app/data
    environment:
      KAFKA_BOOTSTRAP: "kafka:29092"
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: "9042"
      HBASE_HOST: hbase
      HBASE_PORT: "9090"
      ZOOKEEPER_HOST: zookeeper
      PYTHONPATH: "/app/speed-layer:/app/batch-layer"
    command: ["/app/speed-layer/streaming_app.py"]
    restart: unless-stopped

  # ── Kafka Producer (manual: docker compose --profile tools up producer)
  producer:
    build:
      context: ./speed-layer
      dockerfile: Dockerfile.producer
    container_name: py-producer
    hostname: producer
    networks:
      - cybersec-net
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      KAFKA_BOOTSTRAP: "kafka:29092"
    profiles: ["tools"]
    restart: "no"

  # ── REST API (Flask serving layer) ───────────────────────────────
  api:
    build:
      context: ./serving-layer
      dockerfile: Dockerfile
    container_name: py-api
    hostname: api
    networks:
      - cybersec-net
    depends_on:
      cassandra:
        condition: service_healthy
      hbase:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      HBASE_HOST: hbase
      HBASE_PORT: "9090"
      ZOOKEEPER_HOST: zookeeper
      ZOOKEEPER_PORT: "2181"
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: "9042"
      CASSANDRA_DC: datacenter1
      SERVER_PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | /opt/kafka/bin/zookeeper-shell.sh localhost:2181 2>/dev/null | head -1 || zkServer.sh status 2>/dev/null || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Dashboard (Nginx static) ──────────────────────────────────────
  dashboard:
    image: nginx:1.25-alpine
    container_name: py-dashboard
    hostname: dashboard
    networks:
      - cybersec-net
    depends_on:
      - api
    ports:
      - "3000:80"
    volumes:
      - ./dashboard/html:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped